<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misterios Globales</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1f1f1f;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #333;
        }
        header h1 {
            margin: 0;
            color: #f39c12;
        }
        main {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .expediente {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .expediente h2 {
            color: #f39c12;
            margin-top: 0;
        }
        .expediente .fecha {
            font-size: 0.85em;
            color: #888;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <header>
        <h1>MISTERIOS GLOBALES</h1>
        <p>Portal de investigación, arqueología y eventos no explicados</p>
    </header>

    <main id="contenedor-expedientes">
        <p id="mensaje-carga">Cargando expedientes diarios...</p>
    </main>

    <footer>
        <p>© Misterios Globales — Actualizado automáticamente</p>
    </footer>

    <script>
        // Carga el archivo JSON usando la ruta relativa corregida './'
        fetch('./noticias.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('No se pudo encontrar el archivo de noticias');
                }
                return response.json();
            })
            .then(data => {
                const contenedor = document.getElementById('contenedor-expedientes');
                contenedor.innerHTML = ''; // Limpia el mensaje de "Cargando..."

                if (data.length === 0) {
                    contenedor.innerHTML = '<p>No hay expedientes disponibles hoy.</p>';
                    return;
                }

                // Genera el HTML para cada artículo del JSON
                data.forEach(item => {
                    const articulo = document.createElement('article');
                    articulo.className = 'expediente';
                    articulo.innerHTML = `
                        <h2>${item.titulo}</h2>
                        <p class="fecha">${item.fecha || ''}</p>
                        <p>${item.contenido}</p>
                    `;
                    contenedor.appendChild(articulo);
                });
            })
            .catch(error => {
                console.error('Error al cargar expedientes:', error);
                document.getElementById('mensaje-carga').textContent = 
                    'Error al cargar los expedientes. Verifica que noticias.json exista en el repositorio.';
            });
    </script>

</body>
</html>
