<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISTERIOS GLOBALES</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0d11;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        header {
            position: relative;
            background: linear-gradient(180deg, #16161f 0%, #0d0d11 100%);
            border-bottom: 1px solid #2a2a38;
            padding: 40px 20px 30px 20px;
            text-align: center;
        }

        .lang-container {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #1a1a24;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #333348;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .lang-icon {
            font-size: 1.1rem;
        }

        #language-select {
            background: transparent;
            color: #d1d5db;
            border: none;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }

        #language-select option {
            background-color: #1a1a24;
            color: #ffffff;
        }

        h1 {
            color: #f3f4f6;
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .subtitle {
            color: #9ca3af;
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .loading-box {
            text-align: center;
            padding: 30px 40px;
            background-color: #14141c;
            border: 1px solid #262636;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .loading-box p {
            color: #8b949e;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        footer {
            background-color: #09090d;
            border-top: 1px solid #1f1f2e;
            padding: 20px;
            text-align: center;
        }

        footer p {
            color: #6b7280;
            font-size: 0.85rem;
        }

        .expediente {
            background-color: #14141c;
            border: 1px solid #2a2a38;
            border-left: 4px solid #b91c1c;
            border-radius: 6px;
            padding: 22px 26px;
            margin-bottom: 22px;
            max-width: 700px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .expediente::before {
            content: "CLASIFICADO";
            position: absolute;
            top: 14px;
            right: 18px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #b91c1c;
            border: 1px solid #b91c1c;
            padding: 2px 8px;
            border-radius: 3px;
            opacity: 0.7;
            transform: rotate(3deg);
        }

        .expediente h2 {
            color: #f3f4f6;
            font-size: 1.3rem;
            margin-bottom: 6px;
            padding-right: 100px;
        }

        .expediente .fecha {
            color: #6b7280;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
            border-bottom: 1px dashed #2a2a38;
            padding-bottom: 10px;
        }

        .expediente .contenido {
            color: #c9c9d1;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        #expedientes-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .error-box p {
            color: #ef4444;
        }

        @media (max-width: 600px) {
            header {
                padding-top: 60px;
            }
            .lang-container {
                top: 12px;
                right: 50%;
                transform: translateX(50%);
            }
            h1 {
                font-size: 1.6rem;
            }
            .subtitle {
                font-size: 0.9rem;
            }
            .expediente {
                padding: 18px 20px;
            }
            .expediente h2 {
                padding-right: 0;
            }
            .expediente::before {
                position: static;
                display: inline-block;
                margin-bottom: 10px;
                transform: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="lang-container">
            <span class="lang-icon">🌐</span>
            <select id="language-select" onchange="changeLanguage(this.value)">
                <option value="es" selected>Español</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
            </select>
        </div>

        <h1 id="site-title">MISTERIOS GLOBALES</h1>
        <p class="subtitle" id="site-subtitle">Portal de investigación, arqueología y eventos no explicados</p>
    </header>

    <main>
        <div id="expedientes-container">
            <div class="loading-box" id="loading-box">
                <p id="site-loading">Cargando expedientes diarios...</p>
            </div>
        </div>
    </main>

    <footer>
        <p id="site-footer">© Misterios Globales — Actualizado automáticamente</p>
    </footer>

    <script>
        const translations = {
            es: {
                title: "MISTERIOS GLOBALES",
                subtitle: "Portal de investigación, arqueología y eventos no explicados",
                loading: "Cargando expedientes diarios...",
                footer: "© Misterios Globales — Actualizado automáticamente"
            },
            en: {
                title: "GLOBAL MYSTERIES",
                subtitle: "Research, archaeology, and unexplained events portal",
                loading: "Loading daily files...",
                footer: "© Global Mysteries — Automatically updated"
            },
            fr: {
                title: "MYSTÈRES GLOBAUX",
                subtitle: "Portail de recherche, d'archéologie et d'événements inexpliqués",
                loading: "Chargement des dossiers quotidiens...",
                footer: "© Mystères Globaux — Mis à jour automatiquement"
            },
            de: {
                title: "GLOBALE RÄTSEL",
                subtitle: "Portal für Forschung, Archäologie und unerklärliche Ereignisse",
                loading: "Tägliche Akten werden geladen...",
                footer: "© Globale Rätsel — Automatisch aktualisiert"
            }
        };

        function changeLanguage(lang) {
            localStorage.setItem('misterios_lang', lang);
            document.documentElement.lang = lang;

            document.getElementById('site-title').innerText = translations[lang].title;
            document.getElementById('site-subtitle').innerText = translations[lang].subtitle;
            const loadingEl = document.getElementById('site-loading');
            if (loadingEl) {
                loadingEl.innerText = translations[lang].loading;
            }
            document.getElementById('site-footer').innerText = translations[lang].footer;
        }

        async function cargarExpedientes() {
            const container = document.getElementById('expedientes-container');
            try {
                const respuesta = await fetch('noticias.json?t=' + Date.now());
                if (!respuesta.ok) throw new Error('No se encontró noticias.json');
                const expedientes = await respuesta.json();

                if (!expedientes.length) {
                    container.innerHTML = '<div class="loading-box"><p>No hay expedientes todavía.</p></div>';
                    return;
                }

                container.innerHTML = expedientes.map(exp => `
                    <div class="expediente">
                        <h2>${exp.titulo}</h2>
                        <div class="fecha">${exp.fecha}</div>
                        <div class="contenido">${exp.contenido}</div>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<div class="loading-box error-box"><p>No se pudieron cargar los expedientes.</p></div>';
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('misterios_lang') || 'es';
            const langSelect = document.getElementById('language-select');
            if (langSelect) {
                langSelect.value = savedLang;
            }
            changeLanguage(savedLang);
            cargarExpedientes();
        });
    </script>
</body>
</html>
