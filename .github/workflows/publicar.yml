name: Publicar Noticias de Misterios Globales

on:
  schedule:
    # Se ejecuta automáticamente todos los días a las 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente cuando quieras

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          pip install feedparser google-generativeai

      - name: Ejecutar Bot de Inteligencia Artificial
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python bot_misterios.py

      - name: Guardar cambios y actualizar la web
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add noticias.json
          git commit -m "Actualización diaria de expedientes misteriosos" || exit 0
          git pushu
